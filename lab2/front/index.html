<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LFSR Crypto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">
        <h3>Начальное состояние регистра</h3>

        <input type="text" id="seedBits" placeholder="Введите seed">

        <div id="bitInfo" class="small-text"></div>
        <div class="small-text" style="display:flex; align-items:center; gap:8px;">
    <span id="polyDisplay">Полином: x^31 + x^3 + 1</span>

    <!-- 🔥 кнопка -->
    <button id="editPolyBtn" onclick="editPolynomial()" style="padding:2px 6px; font-size:12px;">
        ✏️
    </button>
</div>
    </div>

    <div class="card">
    <h3>Файл</h3>

    <input type="file" id="fileInput">

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button onclick="process()">Запустить</button>

        <!-- 🔥 скрытая кнопка -->
        <button id="downloadBtn"
                onclick="downloadResult()"
                style="display: none;">
            Скачать .bin
        </button>
    </div>
</div>

    <div class="card">
        <h3>Исходный текст</h3>
        <div id="inputBits" class="byte-container"></div>
    </div>

    <div class="card">
        <h3>Ключ</h3>
        <div id="keyOutput" class="byte-container"></div>
    </div>

    <div class="card full">
        <h3>Шифротекст</h3>
        <div id="output" class="byte-container"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
